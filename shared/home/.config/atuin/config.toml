# Atuin configuration
# https://atuin.sh/docs/config
#
# After installation, import existing history with:
#   atuin import auto
#
# To enable sync across machines:
#   atuin register -u <USERNAME> -e <EMAIL>   # new account
#   atuin login -u <USERNAME>                 # existing account

# =============================================================================
# SEARCH
# =============================================================================

# Fuzzy search mode (prefix / fulltext / fuzzy / skim)
search_mode = "fuzzy"

# Search all history by default; toggle host/session/dir/workspace with ctrl-r
filter_mode = "global"

# (up-arrow is handled by zsh-history-substring-search, not atuin)
filter_mode_shell_up_key_binding = "session"

# Automatically activates workspace filter inside git repos
workspaces = true

# =============================================================================
# UI
# =============================================================================

# Compact layout (matches rest of the config)
style = "compact"

# Press Enter to execute immediately; Tab copies to line for editing
enter_accept = true

# Preview long commands that overflow the terminal width
show_preview = true
max_preview_height = 4

# Show the help row (version, keymap hint, total history count)
show_help = true

# Search bar at the bottom of the screen
invert = false

# Show numeric shortcuts beside list items
show_numeric_shortcuts = true

# =============================================================================
# PRIVACY & SAFETY
# =============================================================================

# Suppress secrets: AWS keys, GitHub PATs, Slack tokens, Stripe keys, etc.
secrets_filter = true

# Keep failed commands — useful for debugging; prune manually if desired
store_failed = true

# Exclude noisy / trivial commands from being stored
history_filter = [
  "^ls$",
  "^ls -[a-zA-Z]+$",   # bare ls -la / -l / -a, but keep ls --long-form etc.
  "^cd$",
  "^pwd$",
  "^clear$",
  "^reset$",
  "^exit$",
  "^history$",
]

# =============================================================================
# SYNC
# =============================================================================

# How often to automatically sync when logged in
sync_frequency = "10m"

# Check for atuin updates on startup
update_check = true

# =============================================================================
# DAEMON  (enables faster background sync and in-memory search index)
# =============================================================================

[daemon]
enabled = true
autostart = true

# =============================================================================
# SYNC V2  (faster, more efficient than v1; default for fresh installs)
# =============================================================================

[sync]
records = true
