set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=#2C2525"

# Left: git branch + cwd (mirrors iTerm2 git + working directory components)
set -g status-left-length 120
set -g status-left " #[fg=#E5A1A1]#(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/.*/ &/') #[fg=#DFE6A1] #{pane_current_path} "

# Window list
set -g status-justify left
set -g window-status-format         "#[fg=#6b5f5e] #W "
set -g window-status-current-format "#[fg=#a9a09a,bold] #W "
set -g window-status-separator ""

# Right: username + hostname + job (mirrors iTerm2 spring → username → hostname → job)
set -g status-right-length 80
set -g status-right "#[fg=#A1D2E6] #(whoami)  #[fg=#BAA1E6] #H  #[fg=#E5A1C6] #{b:pane_current_path} "
